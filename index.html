<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Venta — Gatosauriocrack</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #141720; --surface2: #1c2030; --border: #252a3a;
      --accent: #f7c94b; --accent2: #ff6b6b; --accent3: #6effc5;
      --top-bar: #EA7900;
      --text: #e8eaf2; --muted: #6b7394;
      --font-main: 'Plus Jakarta Sans', sans-serif; --font-mono: 'JetBrains Mono', monospace;
      --radius: 12px; --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-main); font-size: 14px; min-height: 100vh; overflow-x: hidden; }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--top-bar); display: flex; align-items: center; padding: 0 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .burger-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 15px; display: flex; align-items: center; }
    .top-title { font-weight: 800; font-size: 18px; color: white; letter-spacing: -0.5px; }

    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--surface); z-index: 2000; transition: var(--transition); padding: 30px 20px; border-right: 1px solid var(--border); }
    .sidebar.open { left: 0; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1500; display: none; }
    .sidebar-overlay.open { display: block; }
    .nav-link { display: flex; align-items: center; gap: 14px; padding: 14px; color: var(--text); text-decoration: none; font-weight: 600; border-radius: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
    .nav-link:hover { background: var(--surface2); color: var(--accent); }
    .nav-link i { width: 20px; text-align: center; font-size: 16px; }

    .app { position: relative; z-index: 1; max-width: 1200px; margin: 80px auto 0; padding: 0 16px 100px; }
    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }

    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 30px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; }
    .card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
    .card-value { font-weight: 800; font-size: 22px; font-family: var(--font-mono); }
    
    .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 30px; height: 300px; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { padding: 12px 15px; text-align: left; font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); text-transform: uppercase; font-weight: 800; }
    td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-weight: 500; }
    
    .btn { cursor: pointer; border: none; border-radius: 8px; font-weight: 700; padding: 10px 14px; transition: var(--transition); font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-main); }
    .btn-accent { background: var(--accent); color: #000; }
    .btn-danger { background: rgba(255,107,107,0.1); color: var(--accent2); border: 1px solid var(--accent2); }
    .admin-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-family: var(--font-mono); outline: none; }
    .admin-input:focus { border-color: var(--accent); }
    
    .terminal-container { margin-top: 30px; background: #000; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
    .terminal-header { background: #1a1c23; padding: 8px 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
    .terminal-dot { width: 10px; height: 10px; border-radius: 50%; }
    .terminal-body { height: 200px; padding: 15px; font-family: var(--font-mono); font-size: 12px; overflow-y: auto; color: #a9b1d6; line-height: 1.5; }
    .log-time { color: var(--muted); margin-right: 8px; }
    .log-info { color: var(--accent3); }
    .log-error { color: var(--accent2); }
    .log-action { color: var(--accent); }

    #toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: auto; min-width: 200px; padding: 12px 20px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--accent); opacity: 0; transition: 0.3s; z-index: 3000; text-align: center; font-weight: 700; pointer-events: none; }
    .show { opacity: 1 !important; bottom: 35px !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="top-bar">
    <button class="burger-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="top-title">Venta</div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
    <div style="font-weight:800; font-size:22px; margin-bottom:35px; color:var(--accent); letter-spacing:-1px;">DULCE ADMIN</div>
    <div class="nav-link" onclick="showPage('panel')"><i class="fa-solid fa-chart-pie"></i> Ventas</div>
    <div class="nav-link" onclick="showPage('inventario')"><i class="fa-solid fa-box-open"></i> Inventario</div>
    <div class="nav-link" onclick="showPage('socios')"><i class="fa-solid fa-users"></i> Socios</div>
    <div class="nav-link" onclick="showPage('config')"><i class="fa-solid fa-gears"></i> Ajustes</div>
    <div style="margin-top:auto">
        <div class="nav-link" style="color:var(--accent2)" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Salir</div>
    </div>
</nav>

<div class="app">
    <div id="page-panel" class="page active">
        <div class="cards-grid">
            <div class="card"><div class="card-label">Ventas</div><div class="card-value" style="color:var(--accent)" id="v-ingresos">$0</div></div>
            <div class="card"><div class="card-label">Costo</div><div class="card-value" id="v-inversion">$0</div></div>
            <div class="card"><div class="card-label">Ganancia</div><div class="card-value" style="color:var(--accent3)" id="v-ganancia">$0</div></div>
        </div>
        <div class="chart-box"><canvas id="mainChart"></canvas></div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Cant</th><th>Vender</th></tr></thead>
                <tbody id="v-inventory"></tbody>
            </table>
        </div>
    </div>

    <div id="page-inventario" class="page">
        <h2 style="margin-bottom:20px; font-weight:800;">Gestión</h2>
        <div style="background:var(--surface); padding:20px; border-radius:var(--radius); margin-bottom:20px;">
            <input type="text" id="new-p-name" class="admin-input" placeholder="Nombre del producto">
            <input type="number" id="new-p-stock" class="admin-input" placeholder="Cantidad inicial">
            <input type="number" id="new-p-price" class="admin-input" placeholder="Precio de venta">
            <button class="btn btn-accent" style="width:100%" onclick="Config.addProduct()"><i class="fa-solid fa-plus"></i> Guardar Producto</button>
        </div>
        <div id="admin-productos-list"></div>
    </div>

    <div id="page-socios" class="page">
        <h2 style="margin-bottom:20px; font-weight:800;">Capital</h2>
        <div style="background:var(--surface); padding:20px; border-radius:var(--radius); margin-bottom:20px;">
            <input type="text" id="new-socio-name" class="admin-input" placeholder="Nombre del socio">
            <input type="number" id="new-socio-money" class="admin-input" placeholder="Monto aportado">
            <button class="btn btn-accent" style="width:100%" onclick="Config.addSocio()"><i class="fa-solid fa-user-plus"></i> Registrar Socio</button>
        </div>
        <div id="admin-socios-list"></div>
    </div>

    <div id="page-config" class="page">
        <h2 style="margin-bottom:20px; font-weight:800;">GitHub Sync</h2>
        <input type="password" id="gh-token" class="admin-input" placeholder="Personal Access Token">
        <button class="btn btn-accent" style="width:100%" onclick="App.save()"><i class="fa-solid fa-cloud-arrow-up"></i> Forzar Sincronización</button>
        
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-dot" style="background:#ff5f56"></div>
                <div class="terminal-dot" style="background:#ffbd2e"></div>
                <div class="terminal-dot" style="background:#27c93f"></div>
                <span style="font-size:10px; color:var(--muted); margin-left:10px; font-weight:bold">CONSOLE — GITHUB STATUS</span>
            </div>
            <div class="terminal-body" id="terminal">
                <div><span class="log-info">Terminal lista. Esperando acciones...</span></div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
let DB = { socios: [], productos: [] };
let chart;
const CONFIG = {
    owner: "Gatosauriocrack",
    repo: "Finanzas.Gatosauriocrackworl.com",
    token_key: "gh_dulce_token"
};

function log(msg, type = 'info') {
    const term = document.getElementById('terminal');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const div = document.createElement('div');
    div.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${msg}</span>`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('open');
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    toggleSidebar();
    if(id === 'panel') UI.updateChart();
}

async function loadData() {
    const savedToken = localStorage.getItem(CONFIG.token_key);
    if(savedToken) {
        document.getElementById('gh-token').value = savedToken;
        log("Token cargado desde almacenamiento local.");
    }
    try {
        log("Intentando cargar datos desde data.json...");
        const res = await fetch('data.json?t=' + Date.now());
        if (res.ok) {
            DB = await res.json();
            log("Base de datos cargada correctamente.", "info");
        } else {
            log("data.json no encontrado, usando respaldo local.", "action");
            DB = JSON.parse(localStorage.getItem("dulce_json") || '{"socios":[],"productos":[]}');
        }
    } catch (e) {
        log("Error de red, cargando datos locales.", "error");
        DB = JSON.parse(localStorage.getItem("dulce_json") || '{"socios":[],"productos":[]}');
    }
    UI.refresh();
}

const App = {
    save: async () => {
        localStorage.setItem("dulce_json", JSON.stringify(DB));
        UI.refresh();
        const token = document.getElementById('gh-token').value;
        
        if(!token) {
            log("Error: Token no ingresado. Sincronización abortada.", "error");
            showToast("Falta Token", "error");
            return;
        }

        log("Iniciando sincronización con GitHub API...", "action");
        localStorage.setItem(CONFIG.token_key, token);

        try {
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/dispatches`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ 
                    event_type: 'update_db', 
                    client_payload: { json_data: JSON.stringify(DB, null, 2) }
                })
            });

            if(res.status === 204) {
                log("ÉXITO: Petición enviada a GitHub Actions correctamente.", "info");
                showToast("Sincronizado");
            } else if(res.status === 401) {
                log("ERROR 401: Token inválido o expirado.", "error");
                showToast("Token Inválido", "error");
            } else {
                log(`GitHub respondió con estado: ${res.status}`, "error");
            }
        } catch (e) { 
            log("ERROR: Fallo en la conexión con GitHub.", "error");
            showToast("Error de conexión", "error"); 
        }
    },
    vender(id) {
        const p = DB.productos.find(x => x.id === id);
        const qty = parseInt(document.getElementById(`qty-${id}`).value);
        if(p.stock - p.vendidos >= qty) {
            p.vendidos += qty;
            log(`Venta: ${qty}x ${p.nombre}.`, "action");
            this.save();
            showToast("Venta registrada");
        } else {
            log(`Intento de venta sin stock: ${p.nombre}`, "error");
            showToast("Sin existencias", "error");
        }
    }
};

const Config = {
    addProduct() {
        const n = document.getElementById("new-p-name").value;
        const s = parseInt(document.getElementById("new-p-stock").value);
        const p = parseFloat(document.getElementById("new-p-price").value);
        if(n && s && p) {
            DB.productos.push({ id: Date.now(), nombre: n, stock: s, precio: p, vendidos: 0 });
            log(`Producto añadido: ${n}`, "info");
            App.save();
            document.getElementById("new-p-name").value = "";
        }
    },
    addSocio() {
        const n = document.getElementById("new-socio-name").value;
        const m = parseFloat(document.getElementById("new-socio-money").value);
        if(n && m) {
            DB.socios.push({ id: Date.now(), nombre: n, aporte: m });
            log(`Socio registrado: ${n} con $${m}`, "info");
            App.save();
            document.getElementById("new-socio-name").value = "";
        }
    }
};

const UI = {
    refresh() {
        const ing = DB.productos.reduce((s, p) => s + (p.vendidos * p.precio), 0);
        const inv = DB.socios.reduce((s, x) => s + x.aporte, 0);
        document.getElementById("v-ingresos").textContent = `$${ing}`;
        document.getElementById("v-inversion").textContent = `$${inv}`;
        document.getElementById("v-ganancia").textContent = `$${ing - inv}`;
        
        const table = document.getElementById("v-inventory");
        table.innerHTML = "";
        DB.productos.forEach(p => {
            const r = p.stock - p.vendidos;
            table.innerHTML += `<tr><td>${p.nombre}</td><td>$${p.precio}</td><td style="color:${r<5?'var(--accent2)':'var(--accent3)'}">${r}</td><td><input type="number" id="qty-${p.id}" style="width:45px; background:var(--surface2); color:#fff; border:none; padding:6px; border-radius:5px;" value="1"></td><td><button class="btn btn-accent" onclick="App.vender(${p.id})"><i class="fa-solid fa-cart-shopping"></i></button></td></tr>`;
        });
        this.updateChart();
    },
    updateChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: DB.productos.map(p => p.nombre),
                datasets: [{ label: 'Ventas', data: DB.productos.map(p => p.vendidos), backgroundColor: '#f7c94b', borderRadius: 6 }]
            },
            options: { 
                maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, grid: { color: '#252a3a' } }, x: { grid: { display: false } } } 
            }
        });
    }
};

function showToast(m, t = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = m;
    toast.style.borderColor = t === 'error' ? 'var(--accent2)' : 'var(--accent)';
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
}

document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
