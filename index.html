<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DulceAdmin — Gatosauriocrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #141720; --surface2: #1c2030; --border: #252a3a;
      --accent: #f7c94b; --accent2: #ff6b6b; --accent3: #6effc5;
      --text: #e8eaf2; --muted: #6b7394;
      --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
      --radius: 12px; --transition: 0.3s cubic-bezier(.4,0,.2,1);
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 14px; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
    .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 16px 100px; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 24px 0; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
    .logo-name { font-family: var(--font-head); font-size: clamp(18px, 5vw, 24px); font-weight: 800; }
    .section-label { font-family: var(--font-head); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; }
    .card-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .card-value { font-family: var(--font-head); font-size: clamp(20px, 4vw, 28px); font-weight: 700; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; margin-top: 10px; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { padding: 12px 15px; text-align: left; font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px 15px; border-bottom: 1px solid var(--border); }
    .qty-input { width: 45px; background: var(--surface2); border: 1px solid var(--border); color: #fff; padding: 8px 4px; border-radius: 6px; text-align: center; font-size: 14px; }
    .btn { cursor: pointer; border: none; border-radius: 8px; font-family: var(--font-head); font-weight: 700; padding: 10px 14px; transition: var(--transition); font-size: 12px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-accent { background: var(--accent); color: #000; }
    .btn-accent:active { transform: scale(0.95); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-danger { background: rgba(255,107,107,0.1); color: var(--accent2); border: 1px solid var(--accent2); }
    .admin-panel { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 1000; padding: 25px; transition: var(--transition); overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
    .admin-panel.open { right: 0; }
    .admin-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-family: var(--font-mono); font-size: 14px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    #toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 300px; padding: 12px; border-radius: 12px; background: var(--surface2); border: 1px solid var(--accent); opacity: 0; transition: 0.3s; pointer-events: none; z-index: 3000; text-align: center; font-weight: 700; font-size: 12px; }
    .show { opacity: 1 !important; bottom: 35px !important; }
    @media (max-width: 600px) {
        .app { padding: 0 12px 100px; }
        header { padding: 16px 0; }
        .btn-text { display: none; }
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-name">🍬 DulceAdmin</div>
    <div style="display:flex; gap:8px;">
        <button class="btn btn-outline" onclick="toggleAdmin()">⚙️ <span class="btn-text">Panel</span></button>
        <button class="btn btn-accent" onclick="App.openCorte()">📋 <span class="btn-text">Corte</span></button>
    </div>
  </header>

  <div class="cards-grid">
    <div class="card"><div class="card-label">Ventas</div><div class="card-value" style="color:var(--accent)" id="v-ingresos">$0</div></div>
    <div class="card"><div class="card-label">Inversión</div><div class="card-value" id="v-inversion">$0</div></div>
    <div class="card"><div class="card-label">Ganancia</div><div class="card-value" style="color:var(--accent3)" id="v-ganancia">$0</div></div>
  </div>

  <div class="section-label">Mercancía para Venta</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Cant</th><th>Vender</th></tr></thead>
      <tbody id="v-inventory"></tbody>
    </table>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
    <h2 style="font-family:var(--font-head)">Configuración</h2>
    <button class="btn btn-danger" onclick="toggleAdmin()">Cerrar</button>
  </div>
  
  <div class="section-label">GitHub Sync</div>
  <input type="password" id="gh-token" class="admin-input" placeholder="GitHub Personal Access Token">
  
  <div class="section-label">Socios</div>
  <div id="admin-socios"></div>
  <div style="background:var(--surface2); padding:15px; border-radius:12px; margin-top:10px;">
    <input type="text" id="new-socio-name" class="admin-input" placeholder="Nombre">
    <input type="number" id="new-socio-money" class="admin-input" placeholder="Aportación $">
    <button class="btn btn-accent" style="width:100%" onclick="Config.addSocio()">Añadir Socio</button>
  </div>

  <div class="section-label">Productos</div>
  <div id="admin-productos"></div>
  <div style="background:var(--surface2); padding:15px; border-radius:12px; margin-top:10px;">
    <input type="text" id="new-p-name" class="admin-input" placeholder="Nombre">
    <input type="text" id="new-p-emoji" class="admin-input" placeholder="Emoji (ej: 🍭)">
    <input type="number" id="new-p-stock" class="admin-input" placeholder="Stock Inicial">
    <input type="number" id="new-p-price" class="admin-input" placeholder="Precio $">
    <button class="btn btn-accent" style="width:100%" onclick="Config.addProduct()">Añadir Producto</button>
  </div>
  
  <button class="btn btn-danger" style="width:100%; margin-top:40px; opacity:0.4" onclick="App.resetAll()">Limpiar Datos Locales</button>
</div>

<div class="modal-backdrop" id="modalCorte" onclick="if(event.target==this)App.closeCorte()">
  <div class="modal">
    <h2 style="font-family:var(--font-head); margin-bottom:20px;">Corte de Caja</h2>
    <div id="corte-results"></div>
    <button class="btn btn-accent" style="width:100%; margin-top:25px; padding:15px;" onclick="App.closeCorte()">Entendido</button>
  </div>
</div>

<div id="toast"></div>

<script>
let DB = { socios: [], productos: [] };
const CONFIG = {
    owner: "Gatosauriocrack",
    repo: "NOMBRE_DE_TU_REPO", // CAMBIA ESTO
    token_key: "gh_dulce_token"
};

async function loadData() {
    const savedToken = localStorage.getItem(CONFIG.token_key);
    if(savedToken) document.getElementById('gh-token').value = savedToken;
    try {
        const response = await fetch('data.json?t=' + Date.now());
        if (response.ok) {
            DB = await response.json();
        } else {
            const local = localStorage.getItem("dulce_json");
            if (local) DB = JSON.parse(local);
        }
    } catch (e) {
        const local = localStorage.getItem("dulce_json");
        if (local) DB = JSON.parse(local);
    }
    UI.refresh();
}

const App = {
  save: async () => {
    localStorage.setItem("dulce_json", JSON.stringify(DB));
    UI.refresh();
    const token = document.getElementById('gh-token').value;
    if(!token) return;
    localStorage.setItem(CONFIG.token_key, token);
    try {
        await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/dispatches`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ event_type: 'update_db', client_payload: { json_data: JSON.stringify(DB, null, 2) }})
        });
        showToast("Sincronizando con GitHub...");
    } catch (e) {
        showToast("Error al sincronizar", "error");
    }
  },
  vender(id) {
    const p = DB.productos.find(x => x.id === id);
    const input = document.getElementById(`qty-${id}`);
    const cant = parseInt(input.value);
    if(cant > 0 && (p.stock - p.vendidos) >= cant) {
        p.vendidos += cant;
        this.save();
        showToast(`Vendido: ${cant} x ${p.nombre}`);
    } else {
        showToast("Sin inventario", "error");
    }
  },
  openCorte() {
    const ingresos = DB.productos.reduce((s, p) => s + (p.vendidos * p.precio), 0);
    const inversion = DB.socios.reduce((s, x) => s + x.aporte, 0);
    const ganancia = ingresos - inversion;
    const porSocio = DB.socios.length > 0 ? (ganancia / DB.socios.length).toFixed(2) : 0;
    let html = `<div style="font-size:16px"><p>Ventas: <b>$${ingresos}</b></p><p>Costo: <b>$${inversion}</b></p><p style="color:var(--accent3)">Ganancia: <b>$${ganancia}</b></p></div><hr style="margin:15px 0; border:0; border-top:1px solid var(--border)"><p style="font-size:11px; color:var(--muted); margin-bottom:10px;">REPARTO POR SOCIO:</p>`;
    DB.socios.forEach(s => {
        html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>${s.nombre}</span> <b style="color:var(--accent3)">$${ganancia > 0 ? porSocio : 0}</b></div>`;
    });
    document.getElementById("corte-results").innerHTML = html;
    document.getElementById("modalCorte").classList.add("open");
  },
  closeCorte: () => document.getElementById("modalCorte").classList.remove("open"),
  resetAll() {
    if(confirm("¿Seguro que quieres borrar los datos locales?")) {
        DB = { socios: [], productos: [] };
        localStorage.removeItem("dulce_json");
        UI.refresh();
    }
  }
};

const Config = {
  addSocio() {
    const name = document.getElementById("new-socio-name").value;
    const money = parseFloat(document.getElementById("new-socio-money").value);
    if(name && !isNaN(money)) {
        DB.socios.push({ id: Date.now(), nombre: name, aporte: money });
        document.getElementById("new-socio-name").value = "";
        document.getElementById("new-socio-money").value = "";
        App.save();
    }
  },
  removeSocio(id) {
    if(confirm("Eliminar socio?")) {
        DB.socios = DB.socios.filter(s => s.id !== id);
        App.save();
    }
  },
  addProduct() {
    const name = document.getElementById("new-p-name").value;
    const emoji = document.getElementById("new-p-emoji").value || "🍬";
    const stock = parseInt(document.getElementById("new-p-stock").value);
    const price = parseFloat(document.getElementById("new-p-price").value);
    if(name && !isNaN(stock) && !isNaN(price)) {
        DB.productos.push({ id: Date.now(), nombre: name, emoji, stock, precio: price, vendidos: 0 });
        document.getElementById("new-p-name").value = "";
        document.getElementById("new-p-stock").value = "";
        document.getElementById("new-p-price").value = "";
        App.save();
    }
  },
  removeProduct(id) {
    if(confirm("Eliminar producto?")) {
        DB.productos = DB.productos.filter(p => p.id !== id);
        App.save();
    }
  }
};

const UI = {
  refresh() {
    const ingresos = DB.productos.reduce((s, p) => s + (p.vendidos * p.precio), 0);
    const inversion = DB.socios.reduce((s, x) => s + x.aporte, 0);
    document.getElementById("v-ingresos").textContent = `$${ingresos}`;
    document.getElementById("v-inversion").textContent = `$${inversion}`;
    document.getElementById("v-ganancia").textContent = `$${ingresos - inversion}`;
    const table = document.getElementById("v-inventory");
    table.innerHTML = "";
    DB.productos.forEach(p => {
        const rest = p.stock - p.vendidos;
        table.innerHTML += `<tr><td>${p.emoji} ${p.nombre}</td><td>$${p.precio}</td><td><span style="color:${rest < 5 ? 'var(--accent2)' : 'var(--accent3)'}; font-weight:700">${rest}</span></td><td><input type="number" id="qty-${p.id}" class="qty-input" value="1" min="1"></td><td><button class="btn btn-accent" onclick="App.vender(${p.id})">OK</button></td></tr>`;
    });
    const adSocios = document.getElementById("admin-socios");
    adSocios.innerHTML = "";
    DB.socios.forEach(s => {
        adSocios.innerHTML += `<div style="display:flex; justify-content:space-between; background:var(--bg); padding:12px; border-radius:8px; margin-bottom:8px;"><span>${s.nombre} ($${s.aporte})</span><button onclick="Config.removeSocio(${s.id})" style="background:none; border:none; color:var(--accent2); font-size:16px">✕</button></div>`;
    });
    const adProd = document.getElementById("admin-productos");
    adProd.innerHTML = "";
    DB.productos.forEach(p => {
        adProd.innerHTML += `<div style="display:flex; justify-content:space-between; background:var(--bg); padding:12px; border-radius:8px; margin-bottom:8px;"><span>${p.emoji} ${p.nombre} (${p.stock})</span><button onclick="Config.removeProduct(${p.id})" style="background:none; border:none; color:var(--accent2); font-size:16px">✕</button></div>`;
    });
  }
};

function toggleAdmin() { document.getElementById("adminPanel").classList.toggle("open"); }
function showToast(msg, type = "success") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.borderColor = type === "error" ? "var(--accent2)" : "var(--accent)";
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2000);
}
document.addEventListener("DOMContentLoaded", loadData);
</script>
</body>
</html>
