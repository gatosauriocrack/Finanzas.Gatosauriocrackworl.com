name: Actualizar Base de Datos Traficodedulces

on:
  repository_dispatch:
    types: [update_db]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Escribir JSON
        run: |
          echo '${{ toJson(github.event.client_payload.json_data) }}' > data.json
          
      - name: Commit y Push con Reintento
        run: |
          git config --local user.name "Meli Admin Bot"
          git config --local user.email "action@github.com"
          
          git add data.json
          
          if ! git diff --cached --quiet; then
            git commit -m "Admin: Actualización de inventario automática"
            git pull --rebase origin main
            git push
          else
            echo "Sin cambios detectados."
          fi
